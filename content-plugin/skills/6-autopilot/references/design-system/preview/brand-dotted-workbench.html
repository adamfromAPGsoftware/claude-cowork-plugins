<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-workspace); background-image: radial-gradient(circle, #d8d2cc 1.5px, transparent 1.5px); background-size: 32px 32px; min-height: 200px; padding: 28px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); }
  .note { font-size: 12px; color: var(--fg-2); background: var(--bg-slide); border: 1px solid var(--border-default); border-radius: 10px; padding: 10px 16px; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="note">workbench · #e8e4dc · 32px × 1.5px dot grid</div>
</body>
</html>
