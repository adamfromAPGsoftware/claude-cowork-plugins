<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-slide); padding: 22px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; font-family: var(--font-sans); }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 90px; height: 72px; background: var(--bg-panel); border: 1px solid var(--border-default); }
  .k { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: center; }
</style>
</head>
<body>
  <div class="cell"><div class="box" style="border-radius:4px"></div><div class="k">4 · sm (button)</div></div>
  <div class="cell"><div class="box" style="border-radius:6px"></div><div class="k">6 · md (input)</div></div>
  <div class="cell"><div class="box" style="border-radius:10px"></div><div class="k">10 · lg (panel)</div></div>
  <div class="cell"><div class="box" style="border-radius:999px; width:110px; height:36px"></div><div class="k">999 · pill</div></div>
</body>
</html>
