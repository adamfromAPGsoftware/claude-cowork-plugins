<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-slide); padding: 20px 24px; font-family: var(--font-sans); }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .row:last-child { margin: 0; }
  .k { width: 60px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { height: 16px; background: #d97757; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); margin-left: 8px; }
</style>
</head>
<body>
  <div class="row"><div class="k">4</div><div class="bar" style="width:4px"></div><div class="label">--space-1</div></div>
  <div class="row"><div class="k">8</div><div class="bar" style="width:8px"></div><div class="label">--space-2</div></div>
  <div class="row"><div class="k">12</div><div class="bar" style="width:12px"></div><div class="label">--space-3</div></div>
  <div class="row"><div class="k">16</div><div class="bar" style="width:16px"></div><div class="label">--space-4</div></div>
  <div class="row"><div class="k">24</div><div class="bar" style="width:24px"></div><div class="label">--space-6</div></div>
  <div class="row"><div class="k">32</div><div class="bar" style="width:32px"></div><div class="label">--space-8</div></div>
  <div class="row"><div class="k">48</div><div class="bar" style="width:48px"></div><div class="label">--space-12</div></div>
  <div class="row"><div class="k">64</div><div class="bar" style="width:64px"></div><div class="label">--space-16</div></div>
</body>
</html>
