<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--bg-slide); padding: 18px 20px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sw { border-radius: 6px; overflow: hidden; border: 1px solid rgba(0,0,0,0.06); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: #fff; }
  .name { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--fg-1); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#fafaf8"></div><div class="meta"><div class="name">neutral-50</div><div class="hex">#fafaf8</div></div></div>
    <div class="sw"><div class="chip" style="background:#f2ede8"></div><div class="meta"><div class="name">neutral-100</div><div class="hex">#f2ede8</div></div></div>
    <div class="sw"><div class="chip" style="background:#e8e4dc"></div><div class="meta"><div class="name">neutral-150</div><div class="hex">#e8e4dc</div></div></div>
    <div class="sw"><div class="chip" style="background:#d8d2cc"></div><div class="meta"><div class="name">neutral-200</div><div class="hex">#d8d2cc</div></div></div>
    <div class="sw"><div class="chip" style="background:#b9b2ab"></div><div class="meta"><div class="name">neutral-300</div><div class="hex">#b9b2ab</div></div></div>
    <div class="sw"><div class="chip" style="background:#9a928c"></div><div class="meta"><div class="name">neutral-500</div><div class="hex">#9a928c</div></div></div>
    <div class="sw"><div class="chip" style="background:#5c5550"></div><div class="meta"><div class="name">neutral-700</div><div class="hex">#5c5550</div></div></div>
    <div class="sw"><div class="chip" style="background:#1a1614"></div><div class="meta"><div class="name">neutral-900</div><div class="hex">#1a1614</div></div></div>
  </div>
</body>
</html>
